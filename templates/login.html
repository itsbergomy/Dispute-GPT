{% extends "base_header.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<main class="flex justify-center items-center min-h-[75vh] px-4 py-10">
  <div class="glass-card glass-card--heavy glass-p w-full max-w-md glass-animate-in">
    <h2 class="text-2xl font-bold text-center mb-6">Sign In</h2>
    <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
      <div>
        <label for="username" class="glass-label block">Username</label>
        <input id="username" name="username" type="text" required
               class="glass-input w-full" />
      </div>
      <div>
        <label for="password" class="glass-label block">Password</label>
        <input id="password" name="password" type="password" required
               class="glass-input w-full" />
      </div>
      <button type="submit"
              class="w-full glass-btn glass-btn--primary">
        Sign In
      </button>
    </form>
    <p class="mt-4 text-center text-sm">
      Don’t have an account?
      <a href="{{ url_for('signup') }}" class="glass-link">Sign Up</a>
    </p>
  </div>
</main>
{% endblock %}
