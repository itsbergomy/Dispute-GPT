{% extends "base_header.html" %}

{% block title %}Generating Letter{% endblock %}

{% block content %}
<main class="flex justify-center items-center min-h-[75vh] px-4">
  <div class="glass-card glass-card--heavy glass-p text-center max-w-xl w-full glass-animate-in">
    
    <!-- Animated Icon -->
    <div class="text-4xl mb-6 text-blue-900 animate-spin">⏳</div>

    <h2 class="text-2xl font-bold text-[#2C3E50] mb-4">Generating Your Dispute Letter...</h2>
    <p class="text-lg text-[#2C3E50]">Please wait while we prepare your document.</p>
  </div>
</main>

<script>
  setTimeout(function () {
    window.location.href = "/generate-process";
  }, 500);
</script>
{% endblock %}
