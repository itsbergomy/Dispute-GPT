<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}">
</head>
<body class="glass-body flex items-center justify-center min-h-screen px-4">
  <div class="glass-card glass-card--heavy glass-p text-center max-w-md w-full glass-animate-in">
    <h2 class="text-2xl font-bold mb-6 glass-text-3d" style="color:var(--text-primary);">Confirm Account</h2>
    <div class="glass-inset rounded-xl p-5 text-left mb-6">
      <p class="mb-2" style="color:var(--text-secondary);"><strong style="color:var(--text-primary);">Account Name:</strong> {{ account_name }}</p>
      <p class="mb-2" style="color:var(--text-secondary);"><strong style="color:var(--text-primary);">Account Number:</strong> {{ account_number }}</p>
      <p style="color:var(--text-secondary);"><strong style="color:var(--text-primary);">Status:</strong> {{ status }}</p>
    </div>
    <form method="POST" action="{{ url_for('save_confirmed_account') }}">
      <input type="hidden" name="account_name" value="{{ account_name }}">
      <input type="hidden" name="account_number" value="{{ account_number }}">
      <input type="hidden" name="status" value="{{ status }}">
      <div class="flex gap-4">
        <button type="submit" class="glass-btn glass-btn--primary flex-1 glass-shimmer-edge" style="position:relative;overflow:hidden;">Confirm</button>
        <a href="/select-account" class="glass-btn glass-btn--secondary flex-1 text-center">Go Back</a>
      </div>
    </form>
  </div>
</body>
</html>
