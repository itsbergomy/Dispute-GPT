{% extends "base_header.html" %}
{% block title %}DisputeGPT Result — {{ client.first_name }}{% endblock %}

{% block content %}
<main class="pt-20 pb-12 min-h-screen px-6 md:px-12">
  <div class="glass-card glass-card--heavy glass-p">

    <!-- Back Button -->
    <a href="{{ url_for('view_client', client_id=client.id) }}"
       class="glass-btn glass-btn--secondary mb-6 inline-block">
      ← Back to Client
    </a>

    <h2 class="text-2xl font-bold text-blue-900 mb-4">📄 Generated Dispute Letter</h2>

    <form method="POST" action="{{ url_for('finalize_disputegpt_letter', client_id=client.id) }}" enctype="multipart/form-data" class="space-y-6">

      <!-- Editable Letter -->
      <textarea name="edited_letter" rows="20" class="glass-input glass-textarea w-full font-mono text-sm">
{{ letter }}
      </textarea>

      <!-- File Uploads -->
      <div>
        <label class="glass-label mb-1">Upload ID (Image or PDF):</label>
        <input type="file" name="id_file" accept=".jpg,.jpeg,.png,.pdf" class="glass-input w-full">
      </div>

      <div>
        <label class="glass-label mb-1">Upload SSN Card (Image or PDF):</label>
        <input type="file" name="ssn_file" accept=".jpg,.jpeg,.png,.pdf" class="glass-input w-full">
      </div>

      <!-- Submit Buttons -->
      <div class="flex space-x-4">
        <button formaction="{{ url_for('convert_pdf') }}" formmethod="POST"
                class="glass-btn glass-btn--secondary">
          📄 Convert to PDF Package
        </button>

        <button type="submit"
                class="glass-btn glass-btn--primary">
          🚀 Finalize Letter & Mail
        </button>
      </div>
    </form>
  </div>
</main>
{% endblock %}
