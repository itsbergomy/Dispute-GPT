{% extends "base_header.html" %}
{% import '_icons.html' as icons %}
{% block title %}Funding Sequencer{% endblock %}
{% block content %}
<main class="flex justify-center items-center min-h-[75vh] px-4 py-10">
  <div class="glass-card glass-card--heavy glass-p-lg text-center max-w-lg w-full relative glass-animate-in">
    <a href="{% if current_user.is_authenticated and current_user.plan == 'business' %}{{ url_for('business_dashboard') }}{% else %}{{ url_for('index') }}{% endif %}"
       class="absolute top-4 left-4 glass-btn glass-btn--ghost p-3 rounded-full">&larr; Back</a>

    <div class="glass-icon-well mx-auto mb-4" style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:16px;">
      {{ icons.icon_money(size=28, uid='fs1') }}
    </div>
    <h2 class="text-2xl font-bold mb-4 glass-text-3d" style="color:var(--text-primary);">Funding Sequencer</h2>
    <p style="color:var(--text-secondary);">This feature is coming soon. Stay tuned!</p>
  </div>
</main>
{% endblock %}
