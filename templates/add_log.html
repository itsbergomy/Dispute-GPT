{% extends "base_header.html" %}
{% block title %}New Log Entry{% endblock %}

{% block content %}
<main class="max-w-lg mx-auto py-10">
  <div class="glass-card glass-card--heavy glass-p-lg">
    <h1 class="text-2xl font-bold mb-4 glass-text-chrome" style="color:var(--text-primary);">Add Daily Log Entry</h1>
    <form method="POST" class="space-y-4">
      <div>
        <label class="glass-label">Title</label>
        <input name="title" class="glass-input w-full mt-1" required>
      </div>

      <div>
        <label class="glass-label">Content</label>
        <textarea name="content" class="glass-input glass-textarea w-full mt-1" rows="5" required></textarea>
      </div>

      <button type="submit"
              class="glass-btn glass-btn--primary">
        Save Entry
      </button>
    </form>
  </div>
</main>
{% endblock %}
