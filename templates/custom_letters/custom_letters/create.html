{% extends "base.html" %}
{% block title %}Create Template{% endblock %}
{% block content %}
  <h1>Create Custom Letter Template</h1>
  <form method="POST">
    <label>Name</label>
    <input name="name" class="w-full mb-4" placeholder="Template name (e.g. 'Initial Dispute')" />

    <label>Body</label>
    <textarea name="body" rows="10" class="w-full mb-4"
      placeholder="Type your letter here, with placeholders like {account_number}..."></textarea>

    <button type="submit" class="btn btn-primary">Save Template</button>
    <a href="{{ url_for('list_custom_letters') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
